{% extends "api/base.html" %}
{% load static %}

{% block title %}Inscription{% endblock %}

{% block content %}
<div class="register-container">
    <div class="register-card">
        <h2>Inscription</h2>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Nom d'utilisateur" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit">Créer mon compte</button>
        </form>
        <p>Déjà un compte ? <a href="{% url 'login' %}">Se connecter</a></p>
    </div>
</div>
<style>
    .register-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .register-card { background: white; padding: 40px; border-radius: 32px; width: 100%; max-width: 400px; }
    .register-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 40px; border: 1px solid #ddd; }
    .register-card button { width: 100%; padding: 12px; background: #1e6f3f; color: white; border: none; border-radius: 40px; cursor: pointer; }
</style>
{% endblock %}
