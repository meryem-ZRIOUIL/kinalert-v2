{% extends "api/base.html" %}
{% load static %}

{% block title %}Mon tableau de bord{% endblock %}

{% block content %}
<header class="header">
    <div class="logo">
        <img src="{% static 'assets/logo_kinalert.jpeg' %}" alt="Kinalert" class="logo-img">
        <div><h1>Kinalert</h1><p class="slogan">M3a kinalert, khod kintek f w9itek</p></div>
    </div>
    <div class="header-badge">
        <i class="fas fa-user"></i> {{ user.username }}
        <a href="{% url 'logout' %}" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a>
    </div>
</header>

<div class="dashboard-actions">
    <a href="{% url 'config' %}" class="btn btn-primary"><i class="fas fa-sliders-h"></i> Configurer mon boîtier</a>
    <a href="{% url 'historique' %}" class="btn btn-secondary"><i class="fas fa-history"></i> Voir historique</a>
</div>

<style>
    .dashboard-actions { display: flex; gap: 20px; justify-content: center; margin-top: 50px; flex-wrap: wrap; }
    .btn-primary, .btn-secondary { padding: 15px 30px; border-radius: 40px; text-decoration: none; font-weight: bold; }
    .btn-primary { background: #1e6f3f; color: white; }
    .btn-secondary { background: #0f3b5c; color: white; }
    .logout-btn { color: white; margin-left: 10px; }
</style>
{% endblock %}
